<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Backup and Recovery System — My Backups</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060d1a; --sidebar: #080f1f; --card: #0d1829;
      --border: rgba(56,139,255,0.12); --accent: #3b82f6;
      --accent2: #06d6a0; --danger: #f87171;
      --text: #dde8ff; --muted: #5a7099; --sidebar-w: 240px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100; padding: 28px 0;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 22px 28px; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 6px 18px rgba(59,130,246,0.35); }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }
    .logo-name span { color: var(--accent); }
    .nav { flex: 1; padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; color: var(--muted); padding: 10px 10px 6px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; color: var(--muted); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .nav-item:hover { background: rgba(59,130,246,0.08); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,0.14); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-user { margin: 0 12px; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-plan { font-size: 11px; color: var(--accent2); }
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 36px; position: relative; z-index: 1; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
    .page-sub { color: var(--muted); font-size: 13.5px; margin-top: 3px; }
    .btn-new { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, var(--accent), #2563eb); border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; }
    .search-box input { background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; width: 100%; }
    .filter-btn { padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: rgba(59,130,246,0.12); color: var(--accent); border-color: rgba(59,130,246,0.3); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    td { padding: 14px; border-bottom: 1px solid rgba(56,139,255,0.06); font-size: 13.5px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(59,130,246,0.03); }
    .file-name { font-weight: 500; }
    .file-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: rgba(6,214,160,0.12); color: var(--accent2); }
    .badge-pending { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .badge-failed { background: rgba(248,113,113,0.12); color: var(--danger); }
    .actions { display: flex; gap: 6px; }
    .btn-action { padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-action:hover { color: var(--text); border-color: var(--accent); background: rgba(59,130,246,0.08); }
    .btn-action.danger:hover { color: var(--danger); border-color: var(--danger); background: rgba(248,113,113,0.08); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state div { font-size: 48px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 14px; z-index: 999; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .toast.show { display: block; }
    .toast.success { border-color: rgba(6,214,160,0.4); color: var(--accent2); }
    .toast.error { border-color: rgba(248,113,113,0.4); color: var(--danger); }
    @media (max-width: 720px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px 16px; } }
  </style>
</head>
<body>
<div class="bg-grid"></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">☁</div>
    <div class="logo-name">Cloud Backup and <span>Recovery System</span></div>
  </div>
  <nav class="nav">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="upload.html"><span class="nav-icon">⬆</span> Upload Backup</a>
    <a class="nav-item active" href="backup.html"><span class="nav-icon">📁</span> My Backups</a>
    <a class="nav-item" href="restore.html"><span class="nav-icon">🔄</span> Restore Files</a>
    <a class="nav-item" href="setting.html"><span class="nav-icon">⚙️</span> Settings</a>
    <a class="nav-item" href="index.html"><span class="nav-icon">🚪</span> Logout</a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar">V</div>
    <div>
      <div class="user-name">vani</div>
      <div class="user-plan">Pro Plan</div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">My Backups</div>
      <div class="page-sub">Manage and restore all your backed up files</div>
    </div>
    <a href="upload.html" class="btn-new">⬆ New Backup</a>
  </div>

  <div class="card">
    <div class="toolbar">
      <div class="search-box">
        🔍 <input type="text" id="search" placeholder="Search backups..." oninput="filterFiles()"/>
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">✓ Completed</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Pending</button>
    </div>

    <div id="table-container">
      <div class="loading">⏳ Loading your backups from AWS S3...</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // Show logged in user name
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (user.name) {
  document.querySelectorAll('.user-name').forEach(el => el.textContent = user.name);
  document.querySelectorAll('.avatar').forEach(el => el.textContent = user.name[0].toUpperCase());
  document.querySelectorAll('.user-plan').forEach(el => el.textContent = user.email || 'Free Plan');
}
if (!localStorage.getItem('token')) window.location.href = 'index.html';
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? 'http://localhost:5000' 
  : 'http://3.110.130.238:5000';
  let allFiles = [];
  let currentFilter = 'all';

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
    return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
  }

  function formatDate(d) {
    const date = new Date(d);
    return date.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function loadFiles() {
    try {
      const token = localStorage.getItem('token');
const res = await fetch(`${API}/api/backup/list`, {
  headers: { 'Authorization': `Bearer ${token}` }
});
      const data = await res.json();
      if (data.success) {
        allFiles = data.files;
        renderTable(allFiles);
      } else {
        showError('Failed to load files: ' + data.error);
      }
    } catch (err) {
      document.getElementById('table-container').innerHTML = `
        <div class="empty-state">
          <div>❌</div>
          <p>Cannot connect to server.</p>
          <p style="font-size:12px; margin-top:8px;">Make sure backend is running on port 5000.</p>
        </div>`;
    }
  }

  function renderTable(files) {
    const container = document.getElementById('table-container');
    if (files.length === 0) {
      container.innerHTML = `<div class="empty-state"><div>📂</div><p>No backups found.</p><p style="margin-top:8px;font-size:13px;">Upload your first backup!</p></div>`;
      return;
    }
    let rows = files.map((f, i) => `
      <tr>
        <td>
          <div class="file-name">📄 ${f.name}</div>
          <div class="file-sub">AWS S3 · ${f.key}</div>
        </td>
        <td>${formatSize(f.size)}</td>
        <td>${formatDate(f.date)}</td>
        <td><span class="badge badge-success">✓ Completed</span></td>
        <td>
          <div class="actions">
            <button class="btn-action" onclick="downloadFile('${f.key}', '${f.name}')">⬇ Download</button>
            <button class="btn-action danger" onclick="deleteFile('${f.key}', ${i})">🗑 Delete</button>
          </div>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>File Name</th>
            <th>Size</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="font-size:12px; color:var(--muted); margin-top:16px; text-align:right;">Showing ${files.length} file${files.length !== 1 ? 's' : ''}</div>
    `;
  }

  async function downloadFile(key, name) {
    try {
      fetch(`${API}/api/backup/list`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } })
      const data = await res.json();
      if (data.success) {
        const a = document.createElement('a');
        a.href = data.url;
        a.download = name;
        a.click();
        showToast('✅ Download started!');
      }
    } catch (err) {
      showToast('❌ Download failed', 'error');
    }
  }

  async function deleteFile(key, index) {
    if (!confirm('Are you sure you want to delete this file from S3?')) return;
    try {
      const res = await fetch(`${API}/api/backup/delete?key=${encodeURIComponent(key)}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        allFiles.splice(index, 1);
        renderTable(allFiles);
        showToast('✅ File deleted successfully!');
      }
    } catch (err) {
      showToast('❌ Delete failed', 'error');
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterFiles();
  }

  function filterFiles() {
    const q = document.getElementById('search').value.toLowerCase();
    let filtered = allFiles.filter(f => f.name.toLowerCase().includes(q));
    renderTable(filtered);
  }

  loadFiles();
</script>
</body>
</html>
